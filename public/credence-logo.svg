<svg width="680" height="190" viewBox="0 0 680 190" xmlns="http://www.w3.org/2000/svg">

  <!-- SHIELD body -->
  <path d="M 82,35 L 140,56 L 140,102 C 140,134 114,150 82,160 C 50,150 24,134 24,102 L 24,56 Z" fill="#18305f"/>

  <!-- SHIELD inner face -->
  <path d="M 82,45 L 131,63 L 131,102 C 131,128 109,143 82,151 C 55,143 33,128 33,102 L 33,63 Z" fill="#1d3a75"/>

  <!-- C RING — teal -->
  <path d="M 100.9,71.9 A 34,34 0 1,0 100.9,124.1 L 91.9,113.3 A 20,20 0 1,1 91.9,82.7 Z" fill="#16aba2"/>

  <!-- CHECKMARK — white -->
  <polyline points="90,101 99,113 117,85" fill="none" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Shield highlight edges -->
  <path d="M 82,35 L 140,56" fill="none" stroke="#2a4f9a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 82,35 L  24,56" fill="none" stroke="#2a4f9a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- WORDMARK -->
  <text
    id="wm"
    x="158" y="105"
    font-family="'Lora', Georgia, serif"
    font-size="72"
    font-weight="700"
    fill="#18305f"
    letter-spacing="-1">Credence</text>

  <!-- TALENT — centered under wordmark via JS -->
  <text
    id="talent"
    x="318" y="140"
    font-family="'Manrope', 'Helvetica Neue', Arial, sans-serif"
    font-size="17"
    font-weight="400"
    fill="#8f9ab0"
    letter-spacing="9"
    text-anchor="middle">TALENT</text>

  <!-- Flanking rules — widths set by JS -->
  <line id="rule-left"  x1="158" y1="133" x2="248" y2="133" stroke="#c2c9d8" stroke-width="1"/>
  <line id="rule-right" x1="388" y1="133" x2="478" y2="133" stroke="#c2c9d8" stroke-width="1"/>

  <script>
    (function() {
      var wm     = document.getElementById('wm');
      var talent = document.getElementById('talent');
      var ruleL  = document.getElementById('rule-left');
      var ruleR  = document.getElementById('rule-right');
      var bb     = wm.getBBox();
      var wmLeft = bb.x;
      var wmRight= bb.x + bb.width;
      var wmCx   = wmLeft + bb.width / 2;
      var tHalf  = talent.getBBox().width / 2;
      var gap    = 12;
      talent.setAttribute('x', wmCx);
      ruleL.setAttribute('x1', wmLeft);
      ruleL.setAttribute('x2', wmCx - tHalf - gap);
      ruleR.setAttribute('x1', wmCx + tHalf + gap);
      ruleR.setAttribute('x2', wmRight);
    })();
  </script>

</svg>
